<!DOCTYPE html>
<html>
<head>
	<title>Savegame Viewer &ndash; The legend of Zelda: Breath of the wild</title>
	<meta http-equiv="content-Type" content="text/html; charset=UTF-8"/>
	<meta name="description" content="A savegame viewer for The legend of Zelda: Breath of the wild for unexplored Map Locations and hidden Koroks."/>
	<meta name="keywords" content="html5, savegame, save, editor, hack, exploit, wii u, zelda, breath of the wild, botw, map, korok"/>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
	<link rel="shortcut icon" href="./favicon.png"/>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
	<link type="text/css" rel="stylesheet" href="./assets/css/zelda-botw.css" media="all"/>
	<script type="text/javascript" src="./assets/js/savegame-editor.js"></script>
	<script type="text/javascript" src="./assets/js/zelda-botw.js"></script>
	<script type="text/javascript" src="./assets/js/map-locations.js"></script>
	<!-- <script type="text/javascript" src="./zelda-botw.hashes.js"></script> -->
</head>
<body>

<!-- HEADER -->
<div id="header">
	<div id="header-top">
		<div id="header-row" class="padding-vertical">
			<h1>Unexplored Area Viewer for The Legend of Zelda: BOTW</h1>
			<div class="header-buttons">
				by <a href="https://github.com/d4mation" target="_blank" class="author">Eric Defore</a> and <a href="https://github.com/Xanderphillips" target="_blank" class="author">Xanderphillips</a>
			</div>
		</div>
	</div>
</div>

<div id="toolbar" class="hidden">
	<div class="toolbar-section-title">Map Stats</div>
	<label for="span-number-koroks" data-type="korok"><span class="stat-label-text">Korok Seeds</span>
		<span class="legend-bar dot-korok"></span>
		<span class="stat-value"><span id="span-number-koroks"></span><span id="span-number-total-koroks">/900</span></span>
	</label>
	<label for="span-number-locations" data-type="location"><span class="stat-label-text">Locations</span>
		<span class="legend-bar dot-location"></span>
		<span class="stat-value"><span id="span-number-locations"></span>/<span id="span-number-total-locations"></span></span>
	</label>
	<label for="span-number-shrines" data-type="shrine"><span class="stat-label-text">Shrines<br><span class="stat-subtitle">(Discovered)</span></span>
		<span class="legend-bar dot-shrine"></span>
		<span class="stat-value"><span id="span-number-shrines"></span>/<span id="span-number-total-shrines"></span></span>
	</label>
	<label for="span-number-shrines-completed" data-type="shrine-completed"><span class="stat-label-text">Shrines<br><span class="stat-subtitle">(Completed)</span></span>
		<span class="legend-bar dot-shrine-completed"></span>
		<span class="stat-value"><span id="span-number-shrines-completed"></span>/<span id="span-number-total-shrines-completed"></span></span>
	</label>
	<label for="span-number-towers" data-type="tower"><span class="stat-label-text">Towers</span>
		<span class="legend-bar dot-tower"></span>
		<span class="stat-value"><span id="span-number-towers"></span>/<span id="span-number-total-towers"></span></span>
	</label>
	<label for="span-number-divine-beasts" data-type="divine-beast"><span class="stat-label-text">Divine Beasts</span>
		<span class="legend-bar dot-divine-beast"></span>
		<span class="stat-value"><span id="span-number-divine-beasts"></span>/<span id="span-number-total-divine-beasts"></span></span>
	</label>
	<label data-type="player-position"><span class="stat-label-text">Player Pos</span>
		<span class="legend-bar dot-player-position"></span>
	</label>
	<div id="track-player-row" data-tracking="false">Track Player</div>
	<div id="track-zoom-row">
		<input type="range" id="track-zoom-slider" min="5" max="90" value="15" step="1">
	</div>
	<div id="player-stats-section">
		<div class="player-stats-title">Player Stats</div>
		<div class="player-stat-row">
			<span class="player-stat-label">Hearts</span>
			<span class="player-stat-value" id="span-stat-hearts">&mdash;</span>
		</div>
		<div class="player-stat-row">
			<span class="player-stat-label">Stamina</span>
			<span class="player-stat-value" id="span-stat-stamina">&mdash;</span>
		</div>
		<div class="player-stat-row">
			<span class="player-stat-label">Playtime</span>
			<span class="player-stat-value" id="span-stat-playtime">&mdash;</span>
		</div>
		<div class="player-stat-row">
			<span class="player-stat-label">Rupees</span>
			<span class="player-stat-value" id="span-stat-rupees">&mdash;</span>
		</div>
		<div class="player-stat-row">
			<span class="player-stat-label">Motorcycle</span>
			<span class="motorcycle-light not-owned" id="stat-motorcycle-light"></span>
		</div>
	</div>
	<div id="shape-legend">
		<div class="shape-legend-title">Icon Shapes</div>
		<div class="shape-legend-row">
			<span class="shape-legend-icon shape-circle"></span>
			<span class="shape-legend-label">Points of Interest</span>
		</div>
		<div class="shape-legend-row">
			<span class="shape-legend-icon shape-diamond"></span>
			<span class="shape-legend-label">Warp Points</span>
		</div>
	</div>
	<div id="server-status">
		<span id="save-timestamp-label">Last Update:</span>
		<div id="timestamp-row">
			<span id="save-timestamp"></span>
			<span id="server-status-dot" class="server-status-dot offline"></span>
		</div>
	</div>
</div>


<!-- THE EDITOR -->
<div id="the-editor" class="wrapper hidden">
	<!-- DEBUG -->
	<div id="debug"></div>

	<div id="map-viewport">
		<div id="zoom-label"></div>
		<div id="map-container">
			<img src='./assets/images/BotW-Map.png'/>
			<svg id="path-svg" height="5000" width="6000">
					<defs>
					<marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto" markerUnits="strokeWidth" viewBox="0 0 20 20">
						<path d="M0,0 L0,6 L9,3 Z" fill="lime" stroke="green" stroke-width="1" />
					</marker>
					</defs>
				<g id="path-group" fill="none" stroke="#ffffff" stroke-width="3" marker-start="url(#arrow)""></g>
			</svg>
		</div>
	</div>
	
</div>

<ul id="caca"></ul>
</body>
</html>
